<!DOCTYPE html>
<html lang="en">
<head>
     <title>Frika solutions</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
   <style>
    .logo-container {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    width: 100%;
    background-color: #ffffff;
}
.centered-logo{
    width: 250px;
    height: auto;
    display: block;
}
/*section styling*/
.services-section {
text-align: center;
font-family: Arial, sans-serif;
padding: 50px 20px;
}
.subtitle{
    color: #666;
    margin-bottom: 40px;
}
/*Flexbox cointainer*/
.cards-container {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;  /*allows card to stack on small screens*/

}
/*Individual card styling*/
.card{
    width: 350px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    background: #fff;
}
.card:hover{
    transform: translateY(-5px);
}
.card-image{
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}
.card-image img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
}
/*Background colors for top half of cards*/
.plumber-bg { background-color:#2e7d32;}
.electrician-bg { background-color: #ef6c00;}
.wifi-bg { background-color: hsl(210, 22%, 96%);}

.card-content{
    padding: 20px;
    text-align: left;
}
/*typography and colors*/
.green-text { color: #2e7d32;}
.orange-text { color: #ef6c00;}
/*Buttons*/
.btn{
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}
.btn-green { background-color: #2e7d32; color: white;}
.btn-orange { background-color: #ef6c00; color: white;}
.btn-light { background-color: #f1f8e9; color: #2e7d32; border: 1px solid #c8e6c9; }

      </style>
</head>
<body>
   <div class="logo-container">
               <img src="logo.png" alt="Frika solutions Logo" class="centered-logo">
            </div>
<section class="services-section">
    <h2>Trusted Fundis Near You</h2>
    <p class="subtitle">Choose your services and get your need</p>
    <div class="cards-container">
        <div class="card">
            <div class="card-image plumber-bg">
                <img src="plumber-icon.png" alt="Plumber">
            </div>
            <div class="card-content">
                <h3 class="green-text">Plumbers</h3>
                <p>Pipe leaks, unclogging, and more.</p>
                <button class="btn btn-green">Book Now</button>
            </div>
        </div>
        <div class="card">
            <div class="card-image electrician-bg">
                <img src="Electrician-icon.png" alt="Electrician">
            </div>
            <div class="card-content">
                <h3 class="orange-text">Electricians</h3>
                <p>Wiring ,sockets ,lighting repairs.</p>
                <button class="btn btn-orange">Book Now</button>
            </div>
        </div>
        <div class="card">
            <div class="card-image wifi-bg">
                <img src="wifi-icon.jpeg" alt="Wi-Fi">
            </div>
            <div class="card-content">
                <h3>Wi-Fi & CCTV Installation</h3>
                <p>Wifi setup,troubleshooting and CCtv installation</p>
                <button class="btn btn-light">Book Now</button>
            </div>
        </div>
    </div>
    <button onclick="logout()">Logout</button>

    <script>
        // Check if user is logged in
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));

        if (!currentUser) {
            window.location.href = 'login.html';
        } else {
            // Update UI with user information
            document.getElementById('userName').textContent = currentUser.fullname || currentUser.email;
            document.getElementById('welcomeName').textContent = currentUser.fullname || currentUser.email.split('@')[0];
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
